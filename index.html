<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finance Portal — Discover Group</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23092E74'/%3E%3Cg transform='translate(14 14) scale(0.72)'%3E%3Cpath fill='%23FFFFFF' d='M0.5 0H50C79 0 100 20 100 47C100 55.5 97.8 62.5 93.5 68.5L83.5 68.5C88.5 62.5 90.5 55.5 90.5 47C90.5 26.5 74 13.5 50 13.5H21.5C21.7 32 25.5 47 32 57.5C36.5 65 42 70 48 73C38 71.5 29 65 22 55C12 40.5 6 22 0.5 0Z'/%3E%3Cpath fill='%2329A2DB' d='M100 47C100 56 97.5 63.5 93.5 69C85.5 84.5 69.5 93.5 48 93.5H0.3V79.5H48C67 79.5 81 71.5 88 58.5C90.3 54.5 91.5 50.5 91.7 47Z'/%3E%3C/g%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0d2145;
  --paper:#f1f4f8;
  --card:#ffffff;
  --line:#dde3ec;
  --navy:#0b2e6b;
  --navy-deep:#092348;
  --navy-soft:#e6eefa;
  --gold:#29a2db;
  --gold-deep:#1b86bb;
  --clay:#b4521f;
  --muted:#64748b;
  --radius:10px;
  --display:'Inter',system-ui,sans-serif;
  --body:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  /* legacy aliases so existing rules keep working */
  --teal:#0b2e6b;
  --teal-soft:#e6eefa;
}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--body);font-size:15px;line-height:1.5}
a{color:var(--navy)}
button{font-family:inherit;cursor:pointer}
.hidden{display:none !important}

/* ---------- Login ---------- */
#login{min-height:100vh;display:grid;place-items:center;padding:24px}
.login-card{width:100%;max-width:410px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:38px 34px;box-shadow:0 4px 20px rgba(15,30,61,.07)}
.brand{font-family:var(--display);font-size:20px;font-weight:700;letter-spacing:-.01em;margin:0;text-transform:uppercase;display:flex;align-items:center;gap:12px}
.brand .mark{width:44px;height:44px;border-radius:11px;background:#0b2e6b;display:grid;place-items:center;flex:0 0 auto;padding:8px;box-shadow:0 2px 8px rgba(9,46,116,.25)}
.brand .mark svg{width:100%;height:100%;display:block}
.brand .txt{display:block}
.brand small{display:block;font-family:var(--body);font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:none;color:var(--muted);margin-top:2px}
.login-card p{color:var(--muted);font-size:14px;margin:22px 0 24px;line-height:1.55}
label{display:block;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
input,select,textarea{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:8px;background:#fff;font-family:inherit;font-size:15px;color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--navy);outline-offset:1px;border-color:var(--navy)}
.field{margin-bottom:16px}
.btn{background:var(--navy);color:#fff;border:1px solid var(--navy);padding:10px 18px;border-radius:8px;font-weight:600;font-size:14px}
.btn:hover{background:var(--navy-deep)}
.btn-ghost{background:transparent;color:var(--ink);border-color:var(--line)}
.btn-ghost:hover{background:#eef2f7}
.btn-full{width:100%}
.msg{font-size:14px;padding:10px 12px;border-radius:var(--radius);margin-bottom:16px}
.msg-err{background:#fbeae4;color:#8a3a12;border:1px solid #f0cdbd}
.msg-ok{background:var(--navy-soft);color:var(--navy);border:1px solid #c8d6ea}

/* ---------- Shell ---------- */
.shell{display:grid;grid-template-columns:252px 1fr;min-height:100vh}
.side{background:var(--navy-deep);color:#c8d4e6;padding:22px 0 0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side .brand{color:#fff;font-size:17px;padding:0 20px}
.side .brand .mark{background:#0b2e6b;box-shadow:none}
.side .brand small{color:#8fa3c4;letter-spacing:.08em}
nav{margin-top:20px;flex:1;overflow-y:auto;padding-bottom:8px}
nav::-webkit-scrollbar{width:5px}
nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:3px}
nav button{display:flex;align-items:center;gap:11px;width:calc(100% - 22px);margin:1px 11px;text-align:left;background:none;border:0;border-radius:8px;color:#a8b8d4;padding:9px 13px;font-size:13.5px;font-weight:500}
.ico{width:17px;text-align:center;opacity:.75;font-size:13px;flex:0 0 auto}
nav button:hover{color:#fff;background:rgba(255,255,255,.07)}
nav button.on{color:var(--navy-deep);background:#fff;font-weight:600}
.nav-group{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:#6b7f9e;padding:18px 26px 6px;font-weight:600}
.side-foot{padding:16px 26px;border-top:1px solid rgba(255,255,255,.09);font-size:13px}
.side-foot .who{color:#fff;font-weight:500}
.side-foot .role{color:#7e91b3;font-size:12px;text-transform:capitalize}
.side-foot button{margin-top:10px;background:none;border:1px solid rgba(255,255,255,.22);color:#c8d4e6;padding:6px 12px;border-radius:8px;font-size:13px}

main{padding:32px 36px;max-width:1180px}
h1{font-family:var(--display);font-size:29px;font-weight:700;letter-spacing:-.02em;margin:0 0 4px}
.sub{color:var(--muted);font-size:14px;margin:0 0 28px}
h2{font-family:var(--display);font-size:18px;font-weight:600;letter-spacing:-.01em;margin:32px 0 14px}

/* ---------- Cards / stats ---------- */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:0 1px 2px rgba(15,30,61,.04)}
.stat .k{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600}
.stat .v{font-family:var(--mono);font-size:26px;font-weight:500;margin-top:8px;letter-spacing:-.03em;color:var(--navy)}
.stat .n{font-size:12px;color:var(--muted);margin-top:4px}
.stat.alert .v{color:var(--clay)}
.stat.good .v{color:#1a7f5a}

/* ---------- Tables ---------- */
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 2px rgba(15,30,61,.04)}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:12px 14px;border-bottom:1px solid var(--line);background:#f7f9fc;white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid #eef2f7;vertical-align:middle}
tr:last-child td{border-bottom:0}
tbody tr:hover{background:#f7f9fc}
.num{font-family:var(--mono);text-align:right;white-space:nowrap}
.empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:14px}

.tag{display:inline-block;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;letter-spacing:.02em;text-transform:capitalize}
.t-unpaid,.t-open{background:#fdf0e6;color:#9a4a13}
.t-partial{background:#fbf3d9;color:#7d6410}
.t-paid,.t-settled{background:#e2f3ea;color:#146c4a}
.t-void,.t-written_off{background:#eeecea;color:#6d7370}
.t-overdue{background:#fbe3dc;color:#8a2d12}

.bar{display:flex;gap:10px;align-items:end;flex-wrap:wrap;margin-bottom:16px}
.bar .field{margin:0;min-width:150px}
.bar .grow{flex:1;min-width:200px}

/* ---------- Aging ---------- */
.aging{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.age{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--line);border-radius:var(--radius);padding:14px}
.age .k{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600}
.age .v{font-family:var(--mono);font-size:18px;margin-top:6px}
.age.b1{border-left-color:#1a7f5a}
.age.b2{border-left-color:var(--gold-deep)}
.age.b3{border-left-color:#d9873c}
.age.b4{border-left-color:var(--clay)}
.age.b5{border-left-color:#7d2410}

/* ---------- Split by category ---------- */
.split{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.cat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px}
.cat .k{font-size:13px;font-weight:600}
.cat .v{font-family:var(--mono);font-size:19px;margin-top:6px}
.cat .track{height:4px;background:#eef2f7;border-radius:2px;margin-top:10px;overflow:hidden}
.cat .fill{height:100%;background:var(--navy)}
.cat.ops .fill{background:var(--clay)}

/* ---------- Documents ---------- */
.drop{border:2px dashed var(--line);border-radius:var(--radius);padding:30px 20px;text-align:center;background:var(--card);margin-bottom:20px}
.drop.over{border-color:var(--navy);background:var(--navy-soft)}
.drop p{margin:0 0 4px;font-size:14px}
.drop .hint{color:var(--muted);font-size:13px}
.lock{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;background:#fbe3dc;color:#8a2d12}
.open-tag{display:inline-block;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;background:var(--navy-soft);color:var(--navy)}
.warn{background:#fdf6e3;border:1px solid #e8d9a8;color:#6b5410;padding:12px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:18px}
.warn strong{display:block;margin-bottom:3px}
.progress{height:3px;background:#eef2f7;border-radius:2px;overflow:hidden;margin-top:12px}
.progress div{height:100%;background:var(--navy);transition:width .2s}

/* ---------- Department hub cards ---------- */
.hub{display:flex;flex-direction:column;gap:16px;margin-top:6px}
.hcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:22px 24px;box-shadow:0 1px 2px rgba(13,33,69,.04)}
.hhead{display:flex;gap:16px;align-items:flex-start}
.hicon{width:52px;height:52px;border-radius:12px;display:grid;place-items:center;font-size:22px;flex:0 0 auto}
.hcard h3{margin:0;font-size:19px;font-weight:700;letter-spacing:-.01em}
.hcard .hsub{color:var(--muted);font-size:14px;margin:4px 0 0}
.hlinks{display:grid;grid-template-columns:1fr 1fr;gap:0 26px;margin:18px 0 0;border-top:1px solid var(--line);padding-top:6px}
.hlink{display:flex;align-items:center;gap:10px;padding:10px 2px;background:none;border:0;border-bottom:1px solid #eef2f7;width:100%;text-align:left;font-size:14px;color:var(--ink);font-weight:500}
.hlink:hover{color:var(--navy)}
.hlink .chev{margin-left:auto;color:#b6c2d4;font-size:15px}
.hlink .hi{width:18px;text-align:center;opacity:.65;font-size:13px}
.hlink .cnt{margin-left:auto;display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12.5px;font-family:var(--mono)}
.hmore{display:inline-flex;align-items:center;gap:6px;background:none;border:0;padding:14px 2px 0;font-size:14px;font-weight:600}
.hnote{display:flex;gap:9px;align-items:flex-start;background:var(--navy-soft);border-radius:8px;padding:11px 13px;margin-top:14px;font-size:13px;color:var(--navy)}
.welcome{font-size:29px;font-weight:700;letter-spacing:-.02em;margin:0 0 4px}
@media(max-width:760px){.hlinks{grid-template-columns:1fr}}

/* ---------- Supplier detail ---------- */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin:4px 0 20px}
.tab{background:none;border:0;border-bottom:2px solid transparent;padding:9px 14px;font-size:14px;font-weight:500;color:var(--muted);margin-bottom:-1px}
.tab:hover{color:var(--ink)}
.tab.on{color:var(--navy);border-bottom-color:var(--navy);font-weight:600}
.kv{display:grid;grid-template-columns:150px 1fr;gap:9px 18px;font-size:14px}
.kv-k{color:var(--muted);font-size:13px}
.kv-v{font-weight:500;word-break:break-word}
.modal-wide{max-width:860px}

/* ---------- Modal ---------- */
.veil{position:fixed;inset:0;background:rgba(18,33,31,.45);display:grid;place-items:center;padding:20px;z-index:50}
.modal{background:var(--card);border-radius:var(--radius);width:100%;max-width:560px;max-height:90vh;overflow:auto;padding:28px}
.modal h3{font-family:var(--display);font-size:21px;margin:0 0 20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}

@media(max-width:860px){
  .shell{grid-template-columns:1fr}
  .side{padding:18px 0;position:static;height:auto}
  nav{margin-top:14px;display:flex;overflow-x:auto;gap:2px}
  nav button{white-space:nowrap;padding:10px 16px}
  .nav-group{display:none}
  main{padding:22px 18px}
  .grid2{grid-template-columns:1fr}
  table{font-size:13px}
}
@media(prefers-reduced-motion:reduce){*{transition:none !important;animation:none !important}}
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<section id="login">
  <div class="login-card">
    <h1 class="brand">
      <span class="mark" aria-hidden="true"><svg viewBox="0 0 100 100" fill="none"><path fill="#FFFFFF" d="M0.5 0H50C79 0 100 20 100 47C100 55.5 97.8 62.5 93.5 68.5L83.5 68.5C88.5 62.5 90.5 55.5 90.5 47C90.5 26.5 74 13.5 50 13.5H21.5C21.7 32 25.5 47 32 57.5C36.5 65 42 70 48 73C38 71.5 29 65 22 55C12 40.5 6 22 0.5 0Z"/><path fill="#29A2DB" d="M100 47C100 56 97.5 63.5 93.5 69C85.5 84.5 69.5 93.5 48 93.5H0.3V79.5H48C67 79.5 81 71.5 88 58.5C90.3 54.5 91.5 50.5 91.7 47Z"/></svg></span>
      <span class="txt">Discover Group<small>Finance Portal</small></span>
    </h1>
    <p>Sign in with your company account. Access is granted by a finance administrator.</p>
    <div id="loginMsg"></div>
    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="username">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password">
    </div>
    <button class="btn btn-full" id="signInBtn">Sign in</button>
  </div>
</section>

<!-- ================= APP ================= -->
<div class="shell hidden" id="app">
  <aside class="side">
    <h1 class="brand">
      <span class="mark" aria-hidden="true"><svg viewBox="0 0 100 100" fill="none"><path fill="#FFFFFF" d="M0.5 0H50C79 0 100 20 100 47C100 55.5 97.8 62.5 93.5 68.5L83.5 68.5C88.5 62.5 90.5 55.5 90.5 47C90.5 26.5 74 13.5 50 13.5H21.5C21.7 32 25.5 47 32 57.5C36.5 65 42 70 48 73C38 71.5 29 65 22 55C12 40.5 6 22 0.5 0Z"/><path fill="#29A2DB" d="M100 47C100 56 97.5 63.5 93.5 69C85.5 84.5 69.5 93.5 48 93.5H0.3V79.5H48C67 79.5 81 71.5 88 58.5C90.3 54.5 91.5 50.5 91.7 47Z"/></svg></span>
      <span class="txt">Discover Group<small>Finance Command Center</small></span>
    </h1>
    <nav>
      <div class="nav-group">Overview</div>
      <button data-view="dashboard" class="on"><span class="ico">▤</span>Dashboard</button>

      <div class="nav-group">Booking department</div>
      <button data-view="bk_tour"><span class="ico">▣</span>Tour Bookings</button>
      <button data-view="bk_air"><span class="ico">✈</span>Airline Bookings</button>
      <button data-view="bk_hotel"><span class="ico">▤</span>Hotel Bookings</button>
      <button data-view="bk_land"><span class="ico">▬</span>Land Arrangements</button>
      <button data-view="bk_optional"><span class="ico">◎</span>Optional Tours</button>
      <button data-view="suppliers"><span class="ico">◈</span>Booking Suppliers</button>
      <button data-view="bk_overview"><span class="ico">▥</span>Bookings Overview</button>
      <button data-view="documents"><span class="ico">▦</span>Documents</button>

      <div class="nav-group">Payables (Trade)</div>
      <button data-view="pay_invoices"><span class="ico">▤</span>Supplier Invoices</button>
      <button data-view="pay_po"><span class="ico">▣</span>Purchase Orders</button>
      <button data-view="pay_schedule"><span class="ico">▦</span>Payment Schedule</button>
      <button data-view="pay_made"><span class="ico">✓</span>Payments Made</button>

      <div class="nav-group">Finance (Operations)</div>
      <button data-view="op_all"><span class="ico">▤</span>Operational Expenses</button>
      <button data-view="op_utilities"><span class="ico">⚡</span>Utilities</button>
      <button data-view="op_rentals"><span class="ico">⌂</span>Rentals</button>
      <button data-view="op_salaries"><span class="ico">◔</span>Salaries &amp; Wages</button>
      <button data-view="op_office"><span class="ico">▢</span>Office Expenses</button>
      <button data-view="op_other"><span class="ico">⋯</span>Other Expenses</button>

      <div class="nav-group">Receivables</div>
      <button data-view="ar_client"><span class="ico">▤</span>Client Invoices</button>
      <button data-view="ar_visa"><span class="ico">▣</span>Visa Service Invoices</button>
      <button data-view="ar_received"><span class="ico">◉</span>Payments Received</button>
      <button data-view="ar_overview"><span class="ico">▥</span>Collections Overview</button>

      <div class="nav-group">Reports</div>
      <button data-view="aging"><span class="ico">◕</span>Aging Report</button>
      <button data-view="margin"><span class="ico">◢</span>Tour Margin</button>
      <button data-view="ledger"><span class="ico">▤</span>Payment Ledger</button>
      <button data-view="custom"><span class="ico">▦</span>Custom Reports</button>
    </nav>
    <div class="side-foot">
      <div class="who" id="whoName">—</div>
      <div class="role" id="whoRole">—</div>
      <button id="signOutBtn">Sign out</button>
    </div>
  </aside>

  <main>
    <div id="view"></div>
  </main>
</div>

<div id="modalHost"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
