<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finance Portal — Discover Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#12211f;
  --paper:#f7f5ef;
  --card:#ffffff;
  --line:#dcd8cc;
  --teal:#0f5c54;
  --teal-soft:#e3efec;
  --clay:#b4521f;
  --gold:#c9a227;
  --muted:#6d7370;
  --radius:6px;
  --display:'Fraunces',Georgia,serif;
  --body:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--body);font-size:15px;line-height:1.5}
a{color:var(--teal)}
button{font-family:inherit;cursor:pointer}
.hidden{display:none !important}

/* ---------- Login ---------- */
#login{min-height:100vh;display:grid;place-items:center;padding:24px}
.login-card{width:100%;max-width:400px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:36px 32px}
.brand{font-family:var(--display);font-size:27px;font-weight:700;letter-spacing:-.02em;margin:0}
.brand small{display:block;font-family:var(--body);font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);margin-top:6px}
.login-card p{color:var(--muted);font-size:14px;margin:18px 0 24px}
label{display:block;font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:var(--radius);background:#fff;font-family:inherit;font-size:15px;color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--teal);outline-offset:1px;border-color:var(--teal)}
.field{margin-bottom:16px}
.btn{background:var(--teal);color:#fff;border:1px solid var(--teal);padding:10px 18px;border-radius:var(--radius);font-weight:600;font-size:14px}
.btn:hover{background:#0c4a44}
.btn-ghost{background:transparent;color:var(--ink);border-color:var(--line)}
.btn-ghost:hover{background:#efece4}
.btn-full{width:100%}
.msg{font-size:14px;padding:10px 12px;border-radius:var(--radius);margin-bottom:16px}
.msg-err{background:#fbeae4;color:#8a3a12;border:1px solid #f0cdbd}
.msg-ok{background:var(--teal-soft);color:#0c4a44;border:1px solid #bcdcd5}

/* ---------- Shell ---------- */
.shell{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
.side{background:var(--ink);color:#e8e6df;padding:26px 0;display:flex;flex-direction:column}
.side .brand{color:#fff;font-size:21px;padding:0 24px}
.side .brand small{color:var(--gold)}
nav{margin-top:32px;flex:1}
nav button{display:block;width:100%;text-align:left;background:none;border:0;border-left:3px solid transparent;color:#b9bdb9;padding:11px 24px;font-size:14px;font-weight:500}
nav button:hover{color:#fff;background:rgba(255,255,255,.05)}
nav button.on{color:#fff;border-left-color:var(--gold);background:rgba(255,255,255,.08)}
.nav-group{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#6f7570;padding:20px 24px 8px}
.side-foot{padding:16px 24px;border-top:1px solid rgba(255,255,255,.1);font-size:13px}
.side-foot .who{color:#fff;font-weight:500}
.side-foot .role{color:#8f948f;font-size:12px;text-transform:capitalize}
.side-foot button{margin-top:10px;background:none;border:1px solid rgba(255,255,255,.25);color:#e8e6df;padding:6px 12px;border-radius:var(--radius);font-size:13px}

main{padding:32px 36px;max-width:1180px}
h1{font-family:var(--display);font-size:30px;font-weight:700;letter-spacing:-.02em;margin:0 0 4px}
.sub{color:var(--muted);font-size:14px;margin:0 0 28px}
h2{font-family:var(--display);font-size:20px;font-weight:600;margin:34px 0 14px}

/* ---------- Cards / stats ---------- */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
.stat .k{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600}
.stat .v{font-family:var(--mono);font-size:25px;font-weight:500;margin-top:8px;letter-spacing:-.02em}
.stat .n{font-size:12px;color:var(--muted);margin-top:4px}
.stat.alert .v{color:var(--clay)}
.stat.good .v{color:var(--teal)}

/* ---------- Tables ---------- */
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:11px 14px;border-bottom:1px solid var(--line);background:#faf9f5;white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid #efece4;vertical-align:middle}
tr:last-child td{border-bottom:0}
tbody tr:hover{background:#faf9f5}
.num{font-family:var(--mono);text-align:right;white-space:nowrap}
.empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:14px}

.tag{display:inline-block;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;letter-spacing:.02em;text-transform:capitalize}
.t-unpaid,.t-open{background:#fdf0e6;color:#9a4a13}
.t-partial{background:#fbf3d9;color:#7d6410}
.t-paid,.t-settled{background:var(--teal-soft);color:#0c4a44}
.t-void,.t-written_off{background:#eeecea;color:#6d7370}
.t-overdue{background:#fbe3dc;color:#8a2d12}

.bar{display:flex;gap:10px;align-items:end;flex-wrap:wrap;margin-bottom:16px}
.bar .field{margin:0;min-width:150px}
.bar .grow{flex:1;min-width:200px}

/* ---------- Aging ---------- */
.aging{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.age{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--line);border-radius:var(--radius);padding:14px}
.age .k{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600}
.age .v{font-family:var(--mono);font-size:18px;margin-top:6px}
.age.b1{border-left-color:var(--teal)}
.age.b2{border-left-color:var(--gold)}
.age.b3{border-left-color:#d9873c}
.age.b4{border-left-color:var(--clay)}
.age.b5{border-left-color:#7d2410}

/* ---------- Split by category ---------- */
.split{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.cat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px}
.cat .k{font-size:13px;font-weight:600}
.cat .v{font-family:var(--mono);font-size:19px;margin-top:6px}
.cat .track{height:4px;background:#efece4;border-radius:2px;margin-top:10px;overflow:hidden}
.cat .fill{height:100%;background:var(--teal)}
.cat.ops .fill{background:var(--clay)}

/* ---------- Modal ---------- */
.veil{position:fixed;inset:0;background:rgba(18,33,31,.45);display:grid;place-items:center;padding:20px;z-index:50}
.modal{background:var(--card);border-radius:var(--radius);width:100%;max-width:560px;max-height:90vh;overflow:auto;padding:28px}
.modal h3{font-family:var(--display);font-size:21px;margin:0 0 20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}

@media(max-width:860px){
  .shell{grid-template-columns:1fr}
  .side{padding:18px 0}
  nav{margin-top:14px;display:flex;overflow-x:auto;gap:2px}
  nav button{white-space:nowrap;border-left:0;border-bottom:3px solid transparent;padding:10px 16px}
  nav button.on{border-left:0;border-bottom-color:var(--gold)}
  .nav-group{display:none}
  main{padding:22px 18px}
  .grid2{grid-template-columns:1fr}
  table{font-size:13px}
}
@media(prefers-reduced-motion:reduce){*{transition:none !important;animation:none !important}}
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<section id="login">
  <div class="login-card">
    <h1 class="brand">Discover Group<small>Finance Portal</small></h1>
    <p>Sign in with your company account. Access is granted by a finance administrator.</p>
    <div id="loginMsg"></div>
    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="username">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password">
    </div>
    <button class="btn btn-full" id="signInBtn">Sign in</button>
  </div>
</section>

<!-- ================= APP ================= -->
<div class="shell hidden" id="app">
  <aside class="side">
    <h1 class="brand">Discover Group<small>Finance</small></h1>
    <nav>
      <div class="nav-group">Overview</div>
      <button data-view="dashboard" class="on">Dashboard</button>
      <div class="nav-group">Payables</div>
      <button data-view="bookings">Tour bookings</button>
      <button data-view="operational">Operational expense</button>
      <div class="nav-group">Receivables</div>
      <button data-view="receivables">Client invoices</button>
      <div class="nav-group">Reports</div>
      <button data-view="aging">Aging report</button>
      <button data-view="margin">Tour margin</button>
      <button data-view="ledger">Payment ledger</button>
    </nav>
    <div class="side-foot">
      <div class="who" id="whoName">—</div>
      <div class="role" id="whoRole">—</div>
      <button id="signOutBtn">Sign out</button>
    </div>
  </aside>

  <main>
    <div id="view"></div>
  </main>
</div>

<div id="modalHost"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
